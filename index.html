<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air817 Smart Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="scene">
    <section class="card">
        <div class="shine"></div>

        <div class="content">
        <div class="logo reveal reveal-1">Air817</div>
        <p class="tagline reveal reveal-2">Heating • Cooling • Controls</p>

        <section class="profile">
          <div class="avatar reveal reveal-3">BH</div>
          <h1 class="reveal reveal-4">Branson Hinson</h1>
          <p class="title reveal reveal-5">Service / Controls Technician</p>
        </section>

        <section class="buttons">
          <a class="reveal reveal-6" href="tel:8178742317">Call for Service or Quotes</a>
          <a class="reveal reveal-7" href="sms:8178742317">Text Air817</a>
          <a class="reveal reveal-8" href="mailto:Branson@air817.com">Email Service</a>
          <a class="reveal reveal-9" href="branson.vcf">Save Contact Card</a>
        </section>

        <p class="hint reveal reveal-10">
          Tap “Save Contact Card,” then open the file and add it to your contacts.
        </p>

        <footer class="reveal reveal-11">
          Same team. Same service. Now operating as Air817.
        </footer>
      </div>
    </section>
  </main>
</body>
</html>
